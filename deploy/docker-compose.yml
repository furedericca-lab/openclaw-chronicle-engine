name: memory-lancedb-pro-backend

services:
  memory-lancedb-pro-backend:
    image: ghcr.io/${GHCR_OWNER:-win4r}/memory-lancedb-pro-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: memory-lancedb-pro-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend.toml:/etc/memory-lancedb-pro-backend/backend.toml:ro
      - ../data/memory-lancedb-pro-backend/lancedb:/var/lib/memory-lancedb-pro-backend/lancedb
      - ../data/memory-lancedb-pro-backend/sqlite:/var/lib/memory-lancedb-pro-backend/sqlite
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
