name: Docker Backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/docker-backend.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/docker-backend.yml"

permissions:
  contents: read
  packages: write

jobs:
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_exists: ${{ steps.detect.outputs.backend_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend crate
        id: detect
        run: |
          if [ -f backend/Cargo.toml ]; then
            echo "backend_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-image:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chronicle-engine-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-package-versions:
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Retain only the newest 10 GHCR package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const packageName = "chronicle-engine-backend";
            const keep = 10;

            const ownerInfo = await github.rest.users.getByUsername({
              username: owner,
            });
            const isOrg = ownerInfo.data.type === "Organization";

            const listRoute = isOrg
              ? "GET /orgs/{org}/packages/{package_type}/{package_name}/versions"
              : "GET /users/{username}/packages/{package_type}/{package_name}/versions";
            const listParams = isOrg
              ? { org: owner, package_type: "container", package_name: packageName, per_page: 100 }
              : { username: owner, package_type: "container", package_name: packageName, per_page: 100 };

            const versions = await github.paginate(listRoute, listParams);
            versions.sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

            core.info(`Found ${versions.length} package versions for ${packageName}. Keeping the newest ${keep}.`);
            const staleVersions = versions.slice(keep);

            if (staleVersions.length === 0) {
              core.info("No stale package versions to delete.");
              return;
            }

            const deleteRoute = isOrg
              ? "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}"
              : "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}";

            for (const version of staleVersions) {
              const tags = version.metadata?.container?.tags?.join(", ") || "<untagged>";
              core.info(`Deleting package version ${version.id} created at ${version.created_at} with tags: ${tags}`);
              const deleteParams = isOrg
                ? {
                    org: owner,
                    package_type: "container",
                    package_name: packageName,
                    package_version_id: version.id,
                  }
                : {
                    username: owner,
                    package_type: "container",
                    package_name: packageName,
                    package_version_id: version.id,
                  };
              await github.request(deleteRoute, deleteParams);
            }
